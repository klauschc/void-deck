name: TarotAI
targets:
  TarotAI:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: .
        includes:
          - "*.swift"
          - "**/*.swift"
    settings:
      base:
        INFOPLIST_FILE: TarotAI/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.klauschc.void-deck
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        TARGETED_DEVICE_FAMILY: "1"
