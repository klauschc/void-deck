services:
  void-deck:
    build: .
    container_name: void-deck
    ports:
      - "8000:8000"
    environment:
      - LLM_BASE_URL=https://integrate.api.nvidia.com/v1
      - LLM_MODEL=minimaxai/minimax-m3
      - LLM_TEMPERATURE=0.7
      - NVIDIA_BUILD_API_KEY=${NVID...KEY}
    restart: unless-stopped
